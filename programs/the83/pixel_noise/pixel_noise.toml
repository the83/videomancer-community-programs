[program]
program_id = "com.the83.pixel_noise"
program_name = "Pixel Noise"
program_version = "1.0.0"
abi_version = ">=1.0,<2.0"
author = "Theron Humiston"
license = "GPL-3.0"
categories = ["Noise"]
program_type = "synthesis"
description = "Noise with color, palette, coherence, density, and speed. From the83/shaderz."
hardware_compatibility = ["rev_b"]
core = "yuv444_30b"

# Knob 1: Size — cell area (per-pixel noise to large blocks)
[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Size"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 1
suffix_label = "%"

# Knob 2: Shape — cell aspect ratio (left=tall, center=square, right=wide)
[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "Shape"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 1
suffix_label = "%"

# Knob 3: Density — sparse starfield to full snow
[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Density"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 1
suffix_label = "%"

# Knob 4: Speed — animation rate
[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Speed"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 256
display_float_digits = 1
suffix_label = "%"

# Knob 5: Color — palette select (0 = grayscale, sweep right for colors)
[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "Color"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 1
suffix_label = "%"

# Switch 7: Color Enable
[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Color"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# Switch 8: Compositing Mode
[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Compositing"
value_labels = ["Mix", "Priority"]
initial_value_label = "Mix"

# Knob 6: Angle — base rotation for triangle mode (full 360 sweep)
[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "Angle"
control_mode = "polar_degs_360"
display_min_value = 0
display_max_value = 360
initial_value = 0
display_float_digits = 0
suffix_label = "deg"

# Switch 9: Triangle Mode
[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Triangle"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# Switch 10: Invert
[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Invert"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# Switch 11: Mirror
[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Mirror"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# --- Presets ---
# Size (pot1): base_size = 1 + knob^2/1024 (0→1px, 100→10px, 200→40px, 400→157px)
# Shape (pot2): 512=square, 0=max tall (113:1), 1023=max wide (113:1)
# Density (pot3): color/triangle modes divide effective density by 8

[[preset]]
name = "Snow"
rotary_potentiometer_1 = 0
rotary_potentiometer_3 = 900
rotary_potentiometer_4 = 400

[[preset]]
name = "Starfield"
rotary_potentiometer_1 = 0
rotary_potentiometer_3 = 100
rotary_potentiometer_4 = 128

[[preset]]
name = "Rain"
rotary_potentiometer_1 = 100
rotary_potentiometer_2 = 100
rotary_potentiometer_3 = 500
rotary_potentiometer_4 = 800

[[preset]]
name = "ScanLines"
rotary_potentiometer_1 = 100
rotary_potentiometer_2 = 924
rotary_potentiometer_3 = 500
rotary_potentiometer_4 = 400

[[preset]]
name = "VHS Static"
rotary_potentiometer_3 = 900
rotary_potentiometer_4 = 300
rotary_potentiometer_5 = 800
toggle_switch_7 = 1

[[preset]]
name = "RGB Blocks"
rotary_potentiometer_1 = 400
rotary_potentiometer_3 = 800
rotary_potentiometer_4 = 200
rotary_potentiometer_5 = 64
toggle_switch_7 = 1
toggle_switch_8 = 1

[[preset]]
name = "Neon City"
rotary_potentiometer_1 = 300
rotary_potentiometer_3 = 700
rotary_potentiometer_4 = 150
rotary_potentiometer_5 = 576
toggle_switch_7 = 1

[[preset]]
name = "Triangles"
rotary_potentiometer_1 = 400
rotary_potentiometer_3 = 800
rotary_potentiometer_4 = 100
rotary_potentiometer_5 = 64
toggle_switch_7 = 1
toggle_switch_9 = 1

[[preset]]
name = "Rorschach"
rotary_potentiometer_1 = 300
rotary_potentiometer_3 = 950
rotary_potentiometer_4 = 200
rotary_potentiometer_5 = 576
toggle_switch_7 = 1
toggle_switch_11 = 1

[[preset]]
name = "Negative"
rotary_potentiometer_3 = 700
rotary_potentiometer_4 = 350
toggle_switch_10 = 1
