[program]
program_id = "com.the83.shapey"
program_name = "Shapey"
program_version = "2.0.0"
abi_version = ">=1.0,<2.0"
author = "Theron Humiston"
license = "GPL-3.0"
categories = ["Geometric"]
program_type = "synthesis"
description = "5 shapes with smooth color, rotation, outline, concentric rings, and tiling."
hardware_compatibility = ["rev_b"]
core = "yuv444_30b"

# Knob 1: Shape — cycles through square, circle, triangle
[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Shape"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 1
suffix_label = "%"

# Knob 2: Size — shape radius
[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "Size"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 1
suffix_label = "%"

# Knob 3: Color — 8-color palette
[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Color"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 1
suffix_label = "%"

# Knob 4: Rotation angle
[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Angle"
control_mode = "polar_degs_360"
display_min_value = 0
display_max_value = 360
initial_value = 0
display_float_digits = 0
suffix_label = "deg"

# Knob 5: Horizontal Offset
[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "H Offset"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 1
suffix_label = "%"

# Knob 6: Vertical Offset
[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "V Offset"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 1
suffix_label = "%"

# Switch 7: Outline
[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Outline"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# Switch 8: Concentric
[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Concentric"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# Switch 9: Invert
[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Invert"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# Switch 10: Tiled
[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Tiled"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# Switch 11: Complementary background
[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Complement"
value_labels = ["Off", "On"]
initial_value_label = "Off"
