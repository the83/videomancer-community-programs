# Digital Delay Program Configuration

[program]
program_id = "com.jacobroufa.digital_delay"
program_name = "Digital Delay"
program_version = "0.9.0"
abi_version = ">=1.0,<2.0"
author = "Jacob Roufa"
license = "GPL-3.0"
category = "Video Processing"
description = "Multi-echo delays with threshold gating + strobe + feedback"
hardware_compatibility = ["rev_b"]
core = "yuv444_30b"

[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Strobe Amount"
control_mode = "linear"
display_min_value = 0
display_max_value = 127
initial_value = 512
display_float_digits = 0
suffix_label = "fr"

[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "Threshold"
control_mode = "linear"
display_min_value = -100
display_max_value = 100
initial_value = 512
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Echo Density"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 0
suffix_label = "%"
# Controls active echo count: 0-25%=1 echo, 25-50%=2 echoes, 50-75%=3 echoes, 75-100%=4 echoes

[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Y Delay"
control_mode = "linear"
display_min_value = 0
display_max_value = 511
initial_value = 512
display_float_digits = 0
suffix_label = "px"

[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "U Delay"
control_mode = "linear"
display_min_value = 0
display_max_value = 511
initial_value = 512
display_float_digits = 0
suffix_label = "px"

[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "V Delay"
control_mode = "linear"
display_min_value = 0
display_max_value = 511
initial_value = 512
display_float_digits = 0
suffix_label = "px"

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Enable Strobe"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Enable Delay"
value_labels = ["Off", "On"]
initial_value_label = "On"

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Echo Enable"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Echo Spacing"
value_labels = ["Fibonacci", "Exponential"]
initial_value_label = "Fibonacci"

[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Bypass"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Effect Amount"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 1
suffix_label = "%"
