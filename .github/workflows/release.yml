name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check script syntax
        run: |
          bash -n scripts/setup.sh
          bash -n build_programs.sh

      - name: Run shellcheck
        run: |
          shellcheck scripts/setup.sh build_programs.sh || true

      - name: Verify required files
        run: |
          for file in LICENSE README.md CONTRIBUTING.md .gitignore; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file $file is missing"
              exit 1
            fi
          done
          echo "All required files present"

      - name: Verify programs structure
        run: |
          if [ ! -d "programs" ]; then
            echo "ERROR: programs/ directory is missing"
            exit 1
          fi

          for vendor_dir in programs/*/; do
            vendor=$(basename "$vendor_dir")
            for program_dir in "$vendor_dir"*/; do
              if [ -d "$program_dir" ]; then
                program=$(basename "$program_dir")
                echo "Checking $vendor/$program"

                if [ ! -f "$program_dir/${program}.toml" ]; then
                  echo "ERROR: Missing ${program}.toml in $vendor/$program"
                  exit 1
                fi

                if [ ! -f "$program_dir/${program}.vhd" ]; then
                  echo "ERROR: Missing ${program}.vhd in $vendor/$program"
                  exit 1
                fi

                echo "  $vendor/$program OK"
              fi
            done
          done

  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache OSS CAD Suite
        id: cache-oss-cad-suite
        uses: actions/cache@v4
        with:
          path: videomancer-sdk/build/oss-cad-suite
          key: oss-cad-suite-${{ hashFiles('videomancer-sdk/scripts/setup.sh') }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential python3 python3-pip
          pip3 install jsonschema toml

      - name: Setup OSS CAD Suite
        if: steps.cache-oss-cad-suite.outputs.cache-hit != 'true'
        run: bash scripts/setup.sh

      - name: Build all programs
        run: |
          build_exit=0
          bash build_programs.sh || build_exit=$?
          echo "build_exit=$build_exit" >> "$GITHUB_ENV"

      - name: Check build results
        run: |
          total=$(find out -name "*.vmprog" -type f | wc -l)
          echo "vmprog_count=$total" >> "$GITHUB_ENV"
          if [ "$total" -eq 0 ]; then
            echo "ERROR: No programs built successfully. Aborting release."
            exit 1
          fi
          echo "$total .vmprog file(s) ready for release."
          if [ "$build_exit" != "0" ]; then
            echo "WARNING: Some programs failed to build and will be excluded from the release."
            echo "Successful outputs:"
            find out -name "*.vmprog" -type f | sort
          fi

      - name: Generate checksums
        run: |
          find out -name "*.vmprog" -type f -exec sha256sum {} \; | sort > out/checksums.sha256
          cat out/checksums.sha256

      - name: Package programs by hardware revision
        run: |
          # Build a lookup: program_name -> vendor (from programs/<vendor>/<program>/)
          declare -A vendor_map
          for vendor_dir in programs/*/; do
            vendor=$(basename "$vendor_dir")
            for program_dir in "$vendor_dir"*/; do
              if [ -d "$program_dir" ]; then
                program=$(basename "$program_dir")
                vendor_map["$program"]="$vendor"
              fi
            done
          done

          tag="${{ github.ref_name }}"

          for hw_dir in out/*/; do
            hw=$(basename "$hw_dir")
            if [ "$hw" = "." ]; then continue; fi
            vmprog_count=$(find "$hw_dir" -name "*.vmprog" -type f | wc -l)
            if [ "$vmprog_count" -eq 0 ]; then continue; fi

            zip_name="videomancer-community-programs-${hw}-${tag}.zip"

            echo "Packaging $hw ($vmprog_count programs) -> $zip_name"

            # Create staging directory with programs/<vendor>/<program>.vmprog structure
            stage_dir="$(mktemp -d)"
            for vmprog in "$hw_dir"*.vmprog; do
              [ -f "$vmprog" ] || continue
              program=$(basename "$vmprog" .vmprog)
              vendor="${vendor_map[$program]:-unknown}"
              mkdir -p "$stage_dir/programs/$vendor"
              cp "$vmprog" "$stage_dir/programs/$vendor/${program}.vmprog"
              echo "  programs/$vendor/${program}.vmprog"
            done

            (cd "$stage_dir" && zip -r "$OLDPWD/$zip_name" programs/)
            rm -rf "$stage_dir"
            echo "  Created $zip_name"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            videomancer-community-programs-*.zip
            out/checksums.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
